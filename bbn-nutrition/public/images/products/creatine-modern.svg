<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="containerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="labelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0fdf4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#f8fafc"/>
  
  <!-- Container Shadow -->
  <ellipse cx="200" cy="350" rx="75" ry="12" fill="#000000" opacity="0.1"/>
  
  <!-- Main Container -->
  <rect x="125" y="85" width="150" height="230" rx="8" ry="8" fill="url(#containerGradient)" filter="url(#shadow)"/>
  
  <!-- Container Highlights -->
  <rect x="130" y="90" width="140" height="6" rx="3" ry="3" fill="#ffffff" opacity="0.4"/>
  <rect x="130" y="90" width="15" height="220" rx="3" ry="3" fill="#ffffff" opacity="0.15"/>
  
  <!-- Label Background -->
  <rect x="135" y="115" width="130" height="150" rx="6" ry="6" fill="url(#labelGradient)"/>
  
  <!-- Brand Name -->
  <text x="200" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#059669">BBN</text>
  
  <!-- Product Name -->
  <text x="200" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#374151">CREATINE</text>
  <text x="200" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#374151">MONOHYDRATE</text>
  
  <!-- Molecular Structure Icon -->
  <g transform="translate(185, 180)">
    <circle cx="0" cy="0" r="4" fill="#059669"/>
    <circle cx="15" cy="8" r="3" fill="#10b981"/>
    <circle cx="30" cy="0" r="4" fill="#059669"/>
    <circle cx="15" cy="-8" r="3" fill="#10b981"/>
    <line x1="0" y1="0" x2="15" y2="8" stroke="#6b7280" stroke-width="1"/>
    <line x1="15" y1="8" x2="30" y2="0" stroke="#6b7280" stroke-width="1"/>
    <line x1="30" y1="0" x2="15" y2="-8" stroke="#6b7280" stroke-width="1"/>
    <line x1="15" y1="-8" x2="0" y2="0" stroke="#6b7280" stroke-width="1"/>
  </g>
  
  <!-- Serving Info -->
  <rect x="175" y="210" width="50" height="18" rx="9" ry="9" fill="#059669"/>
  <text x="200" y="221" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">5g</text>
  <text x="200" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#ffffff">PER SERVE</text>
  
  <!-- Purity -->
  <text x="200" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#6b7280">99.9% Pure</text>
  
  <!-- Weight -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#374151">500g</text>
  
  <!-- Quality Badge -->
  <rect x="140" y="95" width="35" height="12" rx="6" ry="6" fill="#10b981"/>
  <text x="157" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#ffffff">PURE</text>
  
  <!-- Strength Indicators -->
  <rect x="220" y="135" width="8" height="4" fill="#10b981"/>
  <rect x="230" y="133" width="8" height="6" fill="#10b981"/>
  <rect x="240" y="131" width="8" height="8" fill="#10b981"/>
</svg>