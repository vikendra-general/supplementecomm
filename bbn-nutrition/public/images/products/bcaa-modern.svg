<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="containerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="labelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#faf5ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#f8fafc"/>
  
  <!-- Container Shadow -->
  <ellipse cx="200" cy="350" rx="70" ry="12" fill="#000000" opacity="0.1"/>
  
  <!-- Main Container -->
  <rect x="130" y="90" width="140" height="220" rx="8" ry="8" fill="url(#containerGradient)" filter="url(#shadow)"/>
  
  <!-- Container Highlights -->
  <rect x="135" y="95" width="130" height="6" rx="3" ry="3" fill="#ffffff" opacity="0.4"/>
  <rect x="135" y="95" width="15" height="210" rx="3" ry="3" fill="#ffffff" opacity="0.15"/>
  
  <!-- Label Background -->
  <rect x="140" y="120" width="120" height="140" rx="6" ry="6" fill="url(#labelGradient)"/>
  
  <!-- Brand Name -->
  <text x="200" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7c3aed">BBN</text>
  
  <!-- Product Name -->
  <text x="200" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#374151">BCAA</text>
  <text x="200" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#374151">AMINO ACIDS</text>
  
  <!-- Amino Acid Chain Visualization -->
  <g transform="translate(175, 190)">
    <!-- Leucine -->
    <circle cx="0" cy="0" r="5" fill="#8b5cf6"/>
    <text x="0" y="2" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#ffffff">L</text>
    
    <!-- Isoleucine -->
    <circle cx="25" cy="0" r="5" fill="#a78bfa"/>
    <text x="25" y="2" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#ffffff">I</text>
    
    <!-- Valine -->
    <circle cx="50" cy="0" r="5" fill="#c4b5fd"/>
    <text x="50" y="2" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#374151">V</text>
    
    <!-- Connecting lines -->
    <line x1="5" y1="0" x2="20" y2="0" stroke="#6b7280" stroke-width="2"/>
    <line x1="30" y1="0" x2="45" y2="0" stroke="#6b7280" stroke-width="2"/>
  </g>
  
  <!-- Ratio Info -->
  <text x="200" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#7c3aed">2:1:1 RATIO</text>
  
  <!-- Serving Info -->
  <rect x="175" y="225" width="50" height="18" rx="9" ry="9" fill="#7c3aed"/>
  <text x="200" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">10g</text>
  <text x="200" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#ffffff">PER SERVE</text>
  
  <!-- Flavor -->
  <text x="200" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#6b7280">Tropical Punch</text>
  
  <!-- Weight -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#374151">400g</text>
  
  <!-- Recovery Badge -->
  <rect x="145" y="100" width="40" height="12" rx="6" ry="6" fill="#8b5cf6"/>
  <text x="165" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#ffffff">RECOVERY</text>
  
  <!-- Muscle Building Icons -->
  <g transform="translate(220, 140)">
    <rect x="0" y="0" width="4" height="8" fill="#8b5cf6"/>
    <rect x="6" y="-2" width="4" height="10" fill="#8b5cf6"/>
    <rect x="12" y="-4" width="4" height="12" fill="#8b5cf6"/>
  </g>
</svg>