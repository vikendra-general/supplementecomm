<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="containerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="labelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef2f2;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="energyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.3" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#f8fafc"/>
  
  <!-- Energy Glow Effect -->
  <circle cx="200" cy="200" r="120" fill="url(#energyGlow)" opacity="0.3"/>
  
  <!-- Container Shadow -->
  <ellipse cx="200" cy="350" rx="70" ry="12" fill="#000000" opacity="0.1"/>
  
  <!-- Main Container -->
  <rect x="130" y="90" width="140" height="220" rx="8" ry="8" fill="url(#containerGradient)" filter="url(#shadow)"/>
  
  <!-- Container Highlights -->
  <rect x="135" y="95" width="130" height="6" rx="3" ry="3" fill="#ffffff" opacity="0.4"/>
  <rect x="135" y="95" width="15" height="210" rx="3" ry="3" fill="#ffffff" opacity="0.15"/>
  
  <!-- Label Background -->
  <rect x="140" y="120" width="120" height="140" rx="6" ry="6" fill="url(#labelGradient)"/>
  
  <!-- Brand Name -->
  <text x="200" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc2626">BBN</text>
  
  <!-- Product Name -->
  <text x="200" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#374151">PRE-WORKOUT</text>
  <text x="200" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#374151">ELITE</text>
  
  <!-- Lightning Bolt Energy Icon -->
  <polygon points="190,185 205,185 195,200 210,200 190,225 185,210 195,210 185,195" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
  
  <!-- Caffeine Content -->
  <rect x="175" y="230" width="50" height="20" rx="10" ry="10" fill="#ef4444"/>
  <text x="200" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">300mg</text>
  <text x="200" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#ffffff">CAFFEINE</text>
  
  <!-- Flavor -->
  <text x="200" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="500" fill="#6b7280">Fruit Punch</text>
  
  <!-- Weight -->
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#374151">300g</text>
  
  <!-- Energy Badge -->
  <rect x="145" y="100" width="35" height="12" rx="6" ry="6" fill="#fbbf24"/>
  <text x="162" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#ffffff">ENERGY</text>
  
  <!-- Performance Indicators -->
  <circle cx="220" cy="140" r="3" fill="#10b981"/>
  <circle cx="230" cy="140" r="3" fill="#10b981"/>
  <circle cx="240" cy="140" r="3" fill="#10b981"/>
</svg>