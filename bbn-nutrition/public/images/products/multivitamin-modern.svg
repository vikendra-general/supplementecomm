<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="containerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="labelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fffbeb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#f8fafc"/>
  
  <!-- Container Shadow -->
  <ellipse cx="200" cy="350" rx="60" ry="10" fill="#000000" opacity="0.1"/>
  
  <!-- Main Container (Bottle Shape) -->
  <rect x="150" y="100" width="100" height="180" rx="6" ry="6" fill="url(#containerGradient)" filter="url(#shadow)"/>
  <rect x="160" y="90" width="80" height="20" rx="4" ry="4" fill="#92400e"/>
  
  <!-- Container Highlights -->
  <rect x="155" y="105" width="90" height="4" rx="2" ry="2" fill="#ffffff" opacity="0.4"/>
  <rect x="155" y="105" width="10" height="170" rx="2" ry="2" fill="#ffffff" opacity="0.15"/>
  
  <!-- Label Background -->
  <rect x="160" y="130" width="80" height="120" rx="4" ry="4" fill="url(#labelGradient)"/>
  
  <!-- Brand Name -->
  <text x="200" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f59e0b">BBN</text>
  
  <!-- Product Name -->
  <text x="200" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">MULTIVITAMIN</text>
  <text x="200" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">COMPLETE</text>
  
  <!-- Vitamin Icons Grid -->
  <g transform="translate(175, 190)">
    <!-- Vitamin A -->
    <circle cx="0" cy="0" r="6" fill="#ef4444"/>
    <text x="0" y="2" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#ffffff">A</text>
    
    <!-- Vitamin C -->
    <circle cx="20" cy="0" r="6" fill="#f59e0b"/>
    <text x="20" y="2" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#ffffff">C</text>
    
    <!-- Vitamin D -->
    <circle cx="40" cy="0" r="6" fill="#eab308"/>
    <text x="40" y="2" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#ffffff">D</text>
    
    <!-- Vitamin E -->
    <circle cx="10" cy="15" r="6" fill="#22c55e"/>
    <text x="10" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#ffffff">E</text>
    
    <!-- B Complex -->
    <circle cx="30" cy="15" r="6" fill="#3b82f6"/>
    <text x="30" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#ffffff">B</text>
  </g>
  
  <!-- Tablet Count -->
  <rect x="175" y="220" width="50" height="16" rx="8" ry="8" fill="#f59e0b"/>
  <text x="200" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff">60 TABLETS</text>
  
  <!-- Daily Value -->
  <text x="200" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="500" fill="#6b7280">Daily Formula</text>
  
  <!-- Quality Badge -->
  <rect x="165" y="110" width="30" height="10" rx="5" ry="5" fill="#10b981"/>
  <text x="180" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#ffffff">COMPLETE</text>
  
  <!-- Wellness Icons -->
  <g transform="translate(210, 148)">
    <!-- Heart for health -->
    <path d="M0,-2 C-2,-4 -6,-4 -6,0 C-6,2 0,6 0,6 C0,6 6,2 6,0 C6,-4 2,-4 0,-2 Z" fill="#ef4444" transform="scale(0.5)"/>
  </g>
  
  <!-- Supplement Facts indicator -->
  <rect x="165" y="260" width="70" height="8" rx="4" ry="4" fill="#e5e7eb"/>
  <text x="200" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#6b7280">SUPPLEMENT FACTS</text>
</svg>