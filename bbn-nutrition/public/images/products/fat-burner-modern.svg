<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="containerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="labelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef2f2;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="fireGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:0.3" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#f8fafc"/>
  
  <!-- Fire Glow Effect -->
  <circle cx="200" cy="200" r="100" fill="url(#fireGlow)" opacity="0.4"/>
  
  <!-- Container Shadow -->
  <ellipse cx="200" cy="350" rx="60" ry="10" fill="#000000" opacity="0.1"/>
  
  <!-- Main Container (Bottle Shape) -->
  <rect x="150" y="100" width="100" height="180" rx="6" ry="6" fill="url(#containerGradient)" filter="url(#shadow)"/>
  <rect x="160" y="90" width="80" height="20" rx="4" ry="4" fill="#7f1d1d"/>
  
  <!-- Container Highlights -->
  <rect x="155" y="105" width="90" height="4" rx="2" ry="2" fill="#ffffff" opacity="0.4"/>
  <rect x="155" y="105" width="10" height="170" rx="2" ry="2" fill="#ffffff" opacity="0.15"/>
  
  <!-- Label Background -->
  <rect x="160" y="130" width="80" height="120" rx="4" ry="4" fill="url(#labelGradient)"/>
  
  <!-- Brand Name -->
  <text x="200" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">BBN</text>
  
  <!-- Product Name -->
  <text x="200" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">L-CARNITINE</text>
  <text x="200" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">FAT BURNER</text>
  
  <!-- Fire/Burn Icon -->
  <g transform="translate(200, 195)">
    <path d="M0,-10 Q-5,-5 -3,0 Q-6,5 0,8 Q6,5 3,0 Q5,-5 0,-10" fill="#f97316"/>
    <path d="M0,-8 Q-3,-4 -2,0 Q-4,3 0,5 Q4,3 2,0 Q3,-4 0,-8" fill="#fbbf24"/>
    <path d="M0,-6 Q-2,-3 -1,0 Q-2,2 0,3 Q2,2 1,0 Q2,-3 0,-6" fill="#fef3c7"/>
  </g>
  
  <!-- L-Carnitine Content -->
  <rect x="170" y="215" width="60" height="18" rx="9" ry="9" fill="#dc2626"/>
  <text x="200" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff">500mg</text>
  <text x="200" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#ffffff">L-CARNITINE</text>
  
  <!-- Capsule Count -->
  <text x="200" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="500" fill="#6b7280">60 Capsules</text>
  
  <!-- Quality Badge -->
  <rect x="165" y="110" width="30" height="10" rx="5" ry="5" fill="#f97316"/>
  <text x="180" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#ffffff">THERMOGENIC</text>
  
  <!-- Energy Boost Icon -->
  <g transform="translate(220, 148)">
    <!-- Lightning bolt -->
    <path d="M0,-4 L3,-1 L1,-1 L4,4 L1,1 L3,1 L0,-4" fill="#fbbf24"/>
  </g>
  
  <!-- Fat Burning Indicators -->
  <g transform="translate(175, 265)">
    <!-- Decreasing bars representing fat loss -->
    <rect x="0" y="0" width="4" height="8" fill="#dc2626" opacity="0.8"/>
    <rect x="6" y="2" width="4" height="6" fill="#dc2626" opacity="0.6"/>
    <rect x="12" y="4" width="4" height="4" fill="#dc2626" opacity="0.4"/>
    <rect x="18" y="6" width="4" height="2" fill="#dc2626" opacity="0.2"/>
    
    <!-- Arrow pointing down -->
    <path d="M30,2 L35,2 L32.5,6 Z" fill="#10b981"/>
    
    <!-- Weight loss text -->
    <text x="45" y="6" font-family="Arial, sans-serif" font-size="6" fill="#6b7280">WEIGHT LOSS</text>
  </g>
  
  <!-- Metabolism boost indicator -->
  <circle cx="230" cy="160" r="8" fill="#f97316" opacity="0.3"/>
  <circle cx="230" cy="160" r="5" fill="#f97316" opacity="0.6"/>
  <circle cx="230" cy="160" r="2" fill="#f97316"/>
</svg>