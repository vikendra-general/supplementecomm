<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="containerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="labelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#f8fafc"/>
  
  <!-- Container Shadow -->
  <ellipse cx="200" cy="350" rx="80" ry="15" fill="#000000" opacity="0.1"/>
  
  <!-- Main Container -->
  <rect x="120" y="80" width="160" height="240" rx="8" ry="8" fill="url(#containerGradient)" filter="url(#shadow)"/>
  
  <!-- Container Highlights -->
  <rect x="125" y="85" width="150" height="8" rx="4" ry="4" fill="#ffffff" opacity="0.3"/>
  <rect x="125" y="85" width="20" height="230" rx="4" ry="4" fill="#ffffff" opacity="0.1"/>
  
  <!-- Label Background -->
  <rect x="130" y="120" width="140" height="160" rx="6" ry="6" fill="url(#labelGradient)"/>
  
  <!-- Brand Name -->
  <text x="200" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e40af">BBN</text>
  
  <!-- Product Name -->
  <text x="200" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#374151">WHEY PROTEIN</text>
  <text x="200" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#374151">ISOLATE</text>
  
  <!-- Protein Content -->
  <circle cx="200" cy="210" r="25" fill="#10b981" stroke="#ffffff" stroke-width="3"/>
  <text x="200" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">25g</text>
  <text x="200" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">PROTEIN</text>
  
  <!-- Flavor -->
  <text x="200" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#6b7280">Chocolate</text>
  
  <!-- Weight -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#374151">2.2 LBS (1KG)</text>
  
  <!-- Quality Badge -->
  <rect x="140" y="95" width="40" height="15" rx="7" ry="7" fill="#fbbf24"/>
  <text x="160" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff">PREMIUM</text>
  
  <!-- Scoop Icon -->
  <ellipse cx="250" cy="140" rx="12" ry="8" fill="#e5e7eb"/>
  <rect x="245" y="135" width="10" height="3" rx="1" ry="1" fill="#9ca3af"/>
</svg>